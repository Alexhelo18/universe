<!DOCTYPE html>

  <link rel="icon" type="image/svg+xml"
        href='data:image/svg+xml,
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="30" fill="none" stroke="black" stroke-width="4"/>
          <ellipse cx="50" cy="50" rx="45" ry="18" fill="none" stroke="black" stroke-width="3"/>
        </svg>'>
  <link rel="stylesheet" href="assets/style.css">

<body>

    <div class="nav-left">
      <div class="logo"></div>
      <span class="brand">Universe</span>
    </div>

    <!-- HAMBURGER MENU (mobile) -->
    <button class="hamburger" id="hamburger-btn">
      <span></span>

  <h1 style="text-align:center; margin-top:20px;">Pubblica un nuovo articolo</h1>

  <form onsubmit="handlePublish(event)">

    <button type="submit">Pubblica</button>
