<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Universe - Registrati</title>
  <link rel="stylesheet" href="assets/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <div class="logo"></div>
      <span class="brand">Universe</span>
    </div>

    <button class="hamburger" id="hamburger-btn">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-right" id="nav-menu">
      <a href="index.html">Feed</a>
      <a id="publish-link" href="article.html">Pubblica</a>
      <a href="about.html">About</a>
      <a id="login-link" href="login.html">Login</a>
      <button id="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h2>Registrati</h2>

      <form onsubmit="handleRegister(event)">
        <input id="reg-nome" type="text" placeholder="Nome" required>
        <input id="reg-cognome" type="text" placeholder="Cognome" required>
        <input id="reg-username" type="text" placeholder="Username" required>
        <input id="reg-email" type="email" placeholder="Email" required>

        <!-- PASSWORD CON OCCHIO MINIMAL SVG -->
        <div class="password-wrapper">
          <input id="reg-password" type="password" placeholder="Password" required>

          <span class="toggle-password" onclick="togglePassword('reg-password', this)">
            <svg class="eye-icon" viewBox="0 0 24 24">
              <path d="M12 4.5C7 4.5 2.7 7.4 1 12c1.7 4.6 6 7.5 11 7.5s9.3-2.9 11-7.5c-1.7-4.6-6-7.5-11-7.5zm0 12a4.5 4.5 0 110-9 4.5 4.5 0 010 9z"/>
            </svg>
          </span>
        </div>

        <p id="register-error" class="error-msg"></p>

        <button type="submit">Registrati</button>
      </form>

      <div class="switch-link">
        Hai già un account? <a href="login.html">Accedi</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
